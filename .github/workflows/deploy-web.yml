name: Deploy web to Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'packages/gmaps-shared/**'
      - 'package.json'
      - 'bun.lock'
      - 'deploy/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # printf "%s\n" guarantees the trailing newline OpenSSL needs to parse
          # the key (libcrypto rejects keys missing the final newline as malformed).
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 65.108.153.112 >> ~/.ssh/known_hosts

      - name: Sync to Hetzner
        env:
          SERVER: root@65.108.153.112
        run: ./deploy/sync.sh

      - name: Smoke test
        # Retry: the first lookup after a restart is cold (bakes cookies, fetches
        # Google via the residential proxy) and can transiently 522, so a single
        # curl -sf races the warm-up. Still fails red on a genuine breakage.
        run: |
          for i in $(seq 1 6); do
            code=$(curl -s --max-time 30 -o /tmp/resp.json -w '%{http_code}' \
              -X POST https://truescore.mohamed3on.com/api/lookup \
              -H 'Content-Type: application/json' \
              -d '{"url":"https://www.google.com/maps/place/Eiffel+Tower/@48.8583701,2.2922873,17z/data=!4m6!3m5!1s0x47e66e2964e34e2d:0x8ddca9ee380ef7e0"}')
            if [ "$code" = 200 ] && jq -e '.score.scorePct >= 0' /tmp/resp.json >/dev/null; then
              echo "smoke test passed (attempt $i)"; exit 0
            fi
            echo "attempt $i: HTTP $code — retrying in 10s"; sleep 10
          done
          echo "smoke test failed after 6 attempts"; cat /tmp/resp.json; exit 1
