name: Deploy web to Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'packages/gmaps-shared/**'
      - 'package.json'
      - 'bun.lock'
      - 'deploy/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # printf "%s\n" guarantees the trailing newline OpenSSL needs to parse
          # the key (libcrypto rejects keys missing the final newline as malformed).
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 65.108.153.112 >> ~/.ssh/known_hosts

      - name: Sync to Hetzner
        env:
          SERVER: root@65.108.153.112
        run: ./deploy/sync.sh

      - name: Smoke test
        # Hit the live service over SSH against localhost. Cloudflare serves the
        # runner IP a 403 managed challenge, and the origin is firewalled to
        # Cloudflare IPs, so SSH is the only path in. Retry to ride out the cold
        # first lookup (cookie bake + Google fetch via the residential proxy).
        run: |
          for i in $(seq 1 6); do
            if ssh root@65.108.153.112 'curl -s --max-time 30 -X POST http://localhost/api/lookup -H "Content-Type: application/json" -d "{\"url\":\"https://www.google.com/maps/place/Eiffel+Tower/@48.8583701,2.2922873,17z/data=!4m6!3m5!1s0x47e66e2964e34e2d:0x8ddca9ee380ef7e0\"}" | grep -qE "\"scorePct\":[0-9]+"'; then
              echo "smoke test passed (attempt $i)"; exit 0
            fi
            echo "attempt $i failed — retrying in 10s"; sleep 10
          done
          echo "smoke test failed after 6 attempts"; exit 1
