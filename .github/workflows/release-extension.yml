name: Release extension

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/extension/**'
      - 'packages/gmaps-shared/**'
      - '.releaserc.json'
      - '.github/workflows/release-extension.yml'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: bun install --frozen-lockfile

      # Gate releases on the extension + shared package staying green.
      - run: bun test
      - run: bunx tsc -p packages/gmaps-shared
      - run: bunx tsc -p packages/extension

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
